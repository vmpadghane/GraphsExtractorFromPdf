# Graph Extractor Configuration

# PDF Processing
pdf:
  dpi: 300
  poppler_path: "poppler/poppler-24.08.0/Library/bin"

# Layout Detection
layout:
  model_path: "lp://efficientdet/PubLayNet"  # LayoutParser model
  threshold: 0.5

# Graph Detection
graph:
  min_aspect_ratio: 0.5
  max_aspect_ratio: 10.0
  min_edge_density: 0.1  # Increased for better quality
  axis_detection_threshold: 0.7

# OCR Settings
ocr:
  engine: "tesseract"  # or "paddle" (if installed)
  lang: "eng"
  config: "--psm 6"

# Ollama LLM
ollama:
  model: "llava:7b"
  temperature: 0.1
  max_tokens: 200

# Image Processing
image:
  format: "PNG"
  quality: 95

# Caption Matching
caption:
  max_distance: 100  # pixels
  keywords: ["Figure", "Fig.", "Graph", "Chart", "Plot"]

# Output
output:
  export_csv: true

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"